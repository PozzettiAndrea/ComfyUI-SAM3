<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PozzettiAndrea/ComfyUI-SAM3 - Test Results</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1923;
            color: #e6edf3;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            background: #162033;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #243656;
        }

        body.in-iframe header {
            display: none;
        }

        body.in-iframe .container {
            padding-top: 1.25rem;
        }

        body.in-iframe .summary-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        h1 a {
            color: #e6edf3;
            text-decoration: none;
        }

        h1 a:hover { color: #58a6ff; }

        .meta-chips {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            background: #1c2d44;
            border: 1px solid #243656;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: #8ba3c1;
        }

        .meta-chip svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Summary Section */
        .summary {
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .progress-bar {
            background: #1c2d44;
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
            flex: 1;
        }

        .progress-fill {
            background: #3fb950;
            height: 100%;
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        .progress-fill.has-failures {
            background: linear-gradient(90deg, #3fb950 0%, #3fb950 0%, #f85149 0%, #f85149 100%);
            width: 100% !important;
            border-radius: 6px;
        }

        .progress-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8ba3c1;
            white-space: nowrap;
            min-width: 3.5rem;
            text-align: right;
        }

        .stats {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .stat-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .stat-pass {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
        }

        .stat-fail {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .stat-total {
            color: #8ba3c1;
            font-size: 0.85rem;
        }

        /* Failed Section */
        .failed-section {
            background: rgba(248, 81, 73, 0.08);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .failed-section h2 {
            color: #f85149;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .failed-item {
            background: #162033;
            border: 1px solid #243656;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.5rem;
        }

        .failed-item:last-child {
            margin-bottom: 0;
        }

        .failed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .failed-name {
            font-weight: 600;
            color: #f85149;
        }

        .failed-duration {
            color: #8ba3c1;
            font-size: 0.8rem;
        }

        .failed-error {
            background: #0f1923;
            border: 1px solid #243656;
            padding: 0.75rem;
            border-radius: 6px;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
            font-size: 0.8rem;
            color: #d29922;
            margin-bottom: 0.5rem;
        }

        .log-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .log-link:hover {
            text-decoration: underline;
        }

        /* Workflow Grid */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-size: 0.8rem;
            color: #8ba3c1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .view-controls {
            display: flex;
            gap: 0;
            align-items: center;
            border: 1px solid #243656;
            border-radius: 6px;
            overflow: hidden;
        }

        .view-btn {
            background: #1c2d44;
            color: #8ba3c1;
            border: none;
            border-right: 1px solid #243656;
            padding: 0.3rem 0.75rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.15s;
        }

        .view-btn:last-child {
            border-right: none;
        }

        .view-btn:hover {
            background: #243656;
            color: #e6edf3;
        }

        .view-btn.active {
            background: #58a6ff;
            color: #fff;
        }

        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .workflow-grid.view-list {
            grid-template-columns: 1fr;
            gap: 0;
        }

        .workflow-grid.view-list .workflow-card {
            border-radius: 0;
            border-bottom: 1px solid #243656;
        }

        .workflow-grid.view-list .workflow-card:first-child {
            border-radius: 8px 8px 0 0;
        }

        .workflow-grid.view-list .workflow-card:last-child {
            border-radius: 0 0 8px 8px;
            border-bottom: none;
        }

        .workflow-grid.view-list .workflow-card:only-child {
            border-radius: 8px;
        }

        .workflow-grid.view-list .workflow-screenshot {
            width: 100%;
            height: auto;
            aspect-ratio: auto;
        }

        .workflow-grid.view-list .workflow-info {
            border-top: 1px solid #243656;
            padding: 0.75rem 1rem;
        }

        .workflow-grid.view-list .workflow-name {
            max-width: none;
            font-size: 0.9rem;
        }

        .workflow-card {
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s;
        }

        .workflow-card:hover {
            transform: translateY(-1px);
            border-color: #4a6282;
        }

        .workflow-card.clickable {
            cursor: pointer;
        }

        .workflow-card.failed {
            border-color: #f85149;
        }

        .workflow-card.failed:hover {
            border-color: #f85149;
        }

        .workflow-screenshot {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            background: #0f1923;
            display: block;
        }

        .workflow-screenshot.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6282;
            font-size: 0.8rem;
        }

        .workflow-info {
            padding: 0.75rem 1rem;
            border-top: 1px solid #243656;
        }

        .workflow-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .workflow-name {
            font-weight: 500;
            font-size: 0.85rem;
            color: #e6edf3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }

        .workflow-badge {
            padding: 0.15rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        .workflow-badge.pass {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
        }

        .workflow-badge.fail {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .workflow-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #4a6282;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(1, 4, 9, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
            overflow-y: auto;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: auto;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #243656;
            align-self: center;
            cursor: zoom-in;
        }

        .img-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1002;
            background: rgba(1, 4, 9, 0.95);
            overflow: auto;
            align-items: center;
            justify-content: center;
        }

        .img-overlay.active {
            display: flex;
        }

        .img-overlay.zoomed {
            align-items: flex-start;
            justify-content: flex-start;
        }

        .img-overlay img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: zoom-in;
        }

        .img-overlay.zoomed img {
            max-width: none;
            max-height: none;
            cursor: zoom-out;
        }

        .lightbox-close {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            color: #e6edf3;
            cursor: pointer;
            opacity: 0.6;
            background: none;
            border: none;
            z-index: 1001;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(22, 32, 51, 0.8);
            border: 1px solid #243656;
            color: #e6edf3;
            font-size: 2.5rem;
            width: 48px;
            height: 64px;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
            padding: 0;
            line-height: 1;
        }

        .lightbox-nav:hover {
            opacity: 1;
        }

        .lightbox-nav-left { left: 1rem; }
        .lightbox-nav-right { right: 1rem; }

        .lightbox-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .lightbox-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e6edf3;
        }

        .lightbox-hardware {
            display: block;
            font-size: 0.75rem;
            color: #8ba3c1;
            margin-top: 0.25rem;
        }

        .lightbox-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .lightbox-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .lightbox-badge.pass {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
        }

        .lightbox-badge.fail {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .lightbox-duration {
            color: #8ba3c1;
            font-size: 0.85rem;
        }

        .lightbox-log {
            background: #0f1923;
            border: 1px solid #243656;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            color: #8ba3c1;
        }

        .lightbox-log::-webkit-scrollbar {
            width: 8px;
        }

        .lightbox-log::-webkit-scrollbar-track {
            background: #162033;
            border-radius: 4px;
        }

        .lightbox-log::-webkit-scrollbar-thumb {
            background: #243656;
            border-radius: 4px;
        }

        .lightbox-log::-webkit-scrollbar-thumb:hover {
            background: #4a6282;
        }

        /* Resource Graph */
        .resource-graph {
            display: none;
            margin-top: 1rem;
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            padding: 1rem;
        }

        .resource-graph.active {
            display: block;
        }

        .resource-graph-title {
            font-size: 0.8rem;
            color: #8ba3c1;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .resource-graph canvas {
            width: 100%;
            height: 120px;
            cursor: crosshair;
        }

        .resource-legend {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #8ba3c1;
        }

        .resource-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .resource-legend .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .resource-legend .ram { background: #3fb950; }
        .resource-legend .gpu { background: #d29922; }

        /* Video Player */
        .video-player {
            display: none;
            margin-top: 1rem;
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            padding: 1rem;
        }

        .video-player.active {
            display: block;
        }

        .video-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .video-play-btn {
            background: #58a6ff;
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .video-play-btn:hover {
            background: #79b8ff;
        }

        .video-frame-counter {
            color: #8ba3c1;
            font-size: 0.8rem;
        }

        .video-slider-container {
            padding: 15px 0;
        }

        /* noUiSlider customization */
        #video-slider {
            height: 6px;
            background: #1c2d44;
            border: none;
            box-shadow: none;
        }

        #video-slider .noUi-connect {
            background: #58a6ff;
        }

        #video-slider .noUi-handle {
            width: 16px;
            height: 16px;
            background: #58a6ff;
            border: none;
            border-radius: 50%;
            box-shadow: none;
            top: -5px;
            right: -8px;
            cursor: pointer;
        }

        #video-slider .noUi-handle:before,
        #video-slider .noUi-handle:after {
            display: none;
        }

        /* Pips (tick marks) */
        .noUi-pips {
            color: #4a6282;
        }

        .noUi-marker {
            background: #243656;
            width: 2px;
        }

        .noUi-marker-large {
            height: 12px;
        }

        .noUi-value {
            display: none;
        }

        /* Models Section */
        .models-section {
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .models-total {
            font-size: 0.8rem;
            color: #8ba3c1;
        }

        .models-folder {
            background: #162033;
            border: 1px solid #243656;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .models-folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            cursor: pointer;
            user-select: none;
            list-style: none;
        }

        .models-folder-header::-webkit-details-marker {
            display: none;
        }

        .models-folder-header::before {
            content: '\25B6';
            font-size: 0.6rem;
            color: #4a6282;
            margin-right: 0.5rem;
            transition: transform 0.15s;
        }

        .models-folder[open] > .models-folder-header::before {
            transform: rotate(90deg);
        }

        .models-folder-name {
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .models-folder-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .models-folder-size {
            font-size: 0.8rem;
            font-weight: 600;
            color: #8ba3c1;
        }

        .models-source-link {
            font-size: 0.75rem;
            color: #3fb950;
            text-decoration: none;
            padding: 0.15rem 0.5rem;
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid rgba(63, 185, 80, 0.2);
            border-radius: 2rem;
        }

        .models-source-link:hover {
            background: rgba(63, 185, 80, 0.2);
            text-decoration: none;
        }

        .models-file-list {
            border-top: 1px solid #243656;
            padding: 0.25rem 0;
        }

        .models-file {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 1rem 0.35rem 2rem;
            font-size: 0.8rem;
        }

        .models-file:hover {
            background: rgba(88, 166, 255, 0.05);
        }

        .models-file-path {
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
            color: #8ba3c1;
            word-break: break-all;
        }

        .models-file-size {
            color: #4a6282;
            white-space: nowrap;
            margin-left: 1rem;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2.5rem;
            color: #4a6282;
            font-size: 0.8rem;
        }

        footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .workflow-grid {
                grid-template-columns: 1fr !important;
            }

            .workflow-grid.view-list .workflow-card {
                grid-template-columns: 1fr;
            }

            .workflow-grid.view-list .workflow-screenshot {
                width: 100%;
                height: auto;
                aspect-ratio: 16/10;
            }

            .stats {
                flex-direction: column;
                align-items: flex-start;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.js"></script>
</head>
<body>
    <header>
        <h1><a href="https://github.com/PozzettiAndrea/PozzettiAndrea/ComfyUI-SAM3">PozzettiAndrea/ComfyUI-SAM3</a> Test Results</h1>
        <div class="meta-chips">
            
        </div>
    </header>

    <div class="container">
        <div class="summary">
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
                <span class="progress-label">0.0%</span>
            </div>
            <div class="stats">
                <span class="stat-badge stat-pass">0 passed</span>
                
                <span class="stat-total">0/0 tests</span>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Workflows</h2>
            <div class="view-controls">
                <button class="view-btn active" onclick="setView('grid')">Grid</button>
                <button class="view-btn" onclick="setView('list')">List</button>
            </div>
        </div>
        <div class="workflow-grid" id="workflow-grid">
            
            <div class="workflow-card clickable " onclick="openLightboxByName('system')">
                <div class="workflow-screenshot placeholder">No screenshot</div>
                <div class="workflow-info">
                    <div class="workflow-header">
                        <span class="workflow-name" title="system">system</span>
                        <span class="workflow-badge pass">pass</span>
                    </div>
                    <div class="workflow-meta">
                        <span>0.00s</span>
                    </div>
                </div>
            </div>
        
        </div>

        

        
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-nav-left" onclick="navigateLightbox(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-nav-right" onclick="navigateLightbox(1)">&#8250;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <video id="lightbox-video" controls preload="metadata" style="display:none; max-width:90vw; max-height:80vh; background:#000;"></video>
            <div class="video-player" id="video-player">
                <div class="video-slider-container">
                    <div id="video-slider"></div>
                </div>
                <div class="video-controls">
                    <span class="video-frame-counter" id="video-frame-counter">0.0s / 0.0s</span>

            overlayImg.src = this.src;
            overlay.classList.add('active');
            overlay.classList.remove('zoomed');
        });

        // Click overlay image: fit -> zoomed -> close
        document.getElementById('img-overlay-content').addEventListener('click', function(e) {
            e.stopPropagation();
            const overlay = document.getElementById('img-overlay');
            if (overlay.classList.contains('zoomed')) {
                closeImgOverlay();
            } else {
                overlay.classList.add('zoomed');
            }
        });

        // Click overlay background -> close overlay
        document.getElementById('img-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeImgOverlay();
        });

        function openFromHash() {
            const hash = decodeURIComponent(window.location.hash.slice(1));
            if (hash && workflowData[hash]) {
                const w = workflowData[hash];
                openLightbox(w.src, w.title, w.status, w.duration, w.log, w.hardware);
            }
        }

        window.addEventListener('hashchange', openFromHash);
        window.addEventListener('load', openFromHash);

        // Listen for messages from parent frames
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'comfytest-open' && e.data.name) {
                openLightboxByName(e.data.name);
            }
            if (e.data.type === 'comfytest-key') {
                handleKey(e.data.key);
            }
        });

        // Detect iframe: hide header and move meta chips into summary
        if (inIframe) {
            document.body.classList.add('in-iframe');
            const chips = document.querySelector('.meta-chips');
            const summary = document.querySelector('.summary');
            if (chips && summary) {
                const wrapper = document.createElement('div');
                wrapper.className = 'summary-meta';
                while (chips.firstChild) wrapper.appendChild(chips.firstChild);
                summary.insertBefore(wrapper, summary.firstChild);
            }
        }
    </script>
</body>
</html>
